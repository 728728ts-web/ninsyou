<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FILTERIZE - 保護ページ</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --accent-green: #ccff00;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .container {
            text-align: left;
            padding-left: 10%;
            width: 100%;
            max-width: 1200px;
            z-index: 1;
        }

        .top-line {
            width: 50px;
            height: 2px;
            background-color: var(--accent-green);
            margin-bottom: 30px;
        }

        .main-title {
            font-size: 15vw;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 0.9;
            margin: 0;
            letter-spacing: -2px;
        }

        .sub-title {
            font-size: 14px;
            text-transform: uppercase;
            color: var(--text-sub);
            margin: 40px 0;
            letter-spacing: 2px;
        }

        .pw-form {
            display: flex;
            flex-wrap: wrap; /* スマホでボタンがはみ出さないように */
            gap: 15px;
            align-items: center;
        }

        .pw-input {
            background: transparent;
            border: 1px solid var(--accent-green);
            border-radius: 4px;
            color: var(--text-main);
            padding: 15px 15px;
            font-size: 14px; /* 日本語を読みやすく少し小さめに */
            width: 260px; /* 文字列が長いので幅を広げたよ */
            box-sizing: border-box;
            -webkit-appearance: none;
        }
        
        /* ここが修正ポイント：薄く出る文字（プレースホルダー） */
        .pw-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0;
        }

        .action-button {
            background-color: var(--accent-green);
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 5%;
            box-sizing: border-box;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-line"></div>
        <h1 class="main-title">FILTERIZE</h1>
        <p class="sub-title">Enter your access code</p>

        <div class="pw-form">
            <input type="text" id="pw_input" class="pw-input" placeholder="管理者に問い合わせてください。" maxlength="4">
            <button class="action-button" onclick="checkPassword()">
                ENTER →
            </button>
        </div>
    </div>

    <div class="footer">
        <div>©2026 T</div>
        <div style="font-size: 10px; padding-right: 5%;">PROTECTED ACCESS</div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('pw_input').value.trim();
            const now = new Date();
            const month = ("0" + (now.getMonth() + 1)).slice(-2);
            const date = ("0" + now.getDate()).slice(-2);
            const correctPW = month + date;

            if (input === correctPW) {
                // パスワード成功時のリンク先（適宜書き換えてね）
                window.location.href = "https://www.dl.dropboxusercontent.com/scl/fi/xhhn2tzd3esj2r13ff504/.exe?rlkey=quvaxs0d48hngb0ykfxt93xo1&st=gpu3nc48&dl=1";
            } else {
                alert("ACCESS DENIED.");
            }
        }
    </script>
</body>
</html>
